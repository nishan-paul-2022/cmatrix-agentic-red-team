
services:
  # PostgreSQL Database
  cmatrix-postgres:
    image: postgres:16-alpine
    container_name: cmatrix-postgres-dev
    environment:
      - POSTGRES_USER=cmatrix
      - POSTGRES_PASSWORD=cmatrix
      - POSTGRES_DB=cmatrix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cmatrix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmatrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"

  # Backend Service (Development Mode)
  app-backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
    container_name: cmatrix-app-backend-dev
    env_file:
      - .env
    volumes:
      - ./app-backend:/app
      - backend-venv:/app/venv
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      cmatrix-postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT} --reload

  app-frontend:
    image: cmatrix-app-frontend-dev:latest   # distinct tag — never conflicts with production image
    build:
      context: ./app-frontend
      dockerfile: Dockerfile.dev
    container_name: cmatrix-app-frontend-dev
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - NODE_ENV=development
      - PORT=${FRONTEND_PORT}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PYTHON_BACKEND_URL=http://host.docker.internal:3012
      # Tell Node.js to look in /app_modules for packages (isolated from host mount)
      - NODE_PATH=/app_modules/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount ONLY the source code — node_modules lives in /app_modules inside the image
      # and is never written to your laptop's disk. No more EACCES errors!
      - ./app-frontend:/app
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - cmatrix-network
    restart: unless-stopped
    # Non-root execution: run as your laptop's own user (UID/GID)
    # so any files Docker touches are owned by YOU, not root
    user: "${UID:-1000}:${GID:-1000}"

networks:
  cmatrix-network:
    driver: bridge

volumes:
  backend-venv:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  huggingface_cache:
    driver: local
