services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cmatrix-postgres
    environment:
      - POSTGRES_USER=cmatrix
      - POSTGRES_PASSWORD=cmatrix
      - POSTGRES_DB=cmatrix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cmatrix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmatrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"

  # Backend Service
  app-backend:
    image: xor2025/cmatrix-backend:latest
    container_name: cmatrix-app-backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - PORT=${BACKEND_PORT}
      - DATABASE_URL=${DATABASE_URL}
      # You should change this secret key in production!
      - SECRET_KEY=${SECRET_KEY}
      # Add your HuggingFace API key here if needed, or use a .env file
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - HUGGINGFACE_MODEL=${HUGGINGFACE_MODEL}
    volumes:
      - ./cmatrix_data/logs:/app/logs
      - ./cmatrix_data/data:/app/data
    networks:
      - cmatrix-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Service
  app-frontend:
    image: xor2025/cmatrix-frontend:latest
    container_name: cmatrix-app-frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - NODE_ENV=production
      - PYTHON_BACKEND_URL=http://app-backend:${BACKEND_PORT}
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - cmatrix-network
    restart: unless-stopped

networks:
  cmatrix-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
