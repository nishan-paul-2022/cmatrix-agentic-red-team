# Enable BuildKit for optimal caching
x-buildkit-config: &buildkit-config
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

services:
  # Redis for Celery message broker
  redis:
    image: redis:7-alpine
    container_name: cmatrix-redis
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1000
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    networks:
      - cmatrix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cmatrix-postgres
    environment:
      - POSTGRES_USER=cmatrix
      - POSTGRES_PASSWORD=cmatrix
      - POSTGRES_DB=cmatrix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cmatrix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmatrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"

  # Qdrant Vector Database for Knowledge Base
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cmatrix-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:${QDRANT_PORT:-6333}"
      - "${QDRANT_GRPC_PORT:-6334}:${QDRANT_GRPC_PORT:-6334}"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - cmatrix-network
    restart: unless-stopped

  # Backend Service (Python/FastAPI)
  app-backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
    container_name: cmatrix-app-backend
    # Enable privileged mode for full host access (required for cybersecurity tool)
    privileged: true
    # Use host network for full network visibility (see all host interfaces)
    network_mode: "host"
    # Share host PID namespace for full process visibility
    pid: "host"
    environment:
      - PORT=${BACKEND_PORT:-8000}
      - DATABASE_URL=postgresql+asyncpg://cmatrix:cmatrix@localhost:${POSTGRES_PORT:-5432}/cmatrix
      - CELERY_BROKER_URL=redis://localhost:${REDIS_PORT:-6379}/0
      - CELERY_RESULT_BACKEND=redis://localhost:${REDIS_PORT:-6379}/1
      - QDRANT_URL=http://localhost:${QDRANT_PORT:-6333}
      - QDRANT_HOST=localhost
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this-in-production-make-it-very-long-and-random}
      - HOST_ROOT=/host  # Path to mounted host filesystem

    volumes:
      # Mount entire host filesystem for full access
      - /:/host
      # Mount data files for persistence
      - ./app-backend/data:/app/data
      # Mount backend code for development (comment out for production)
      - ./app-backend:/app
      # Cache HuggingFace models to avoid re-downloading on every build
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8000}/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker for background jobs
  app-worker:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
    container_name: cmatrix-app-worker
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://cmatrix:cmatrix@postgres:${POSTGRES_PORT:-5432}/cmatrix
      - CELERY_BROKER_URL=redis://redis:${REDIS_PORT:-6379}/0
      - CELERY_RESULT_BACKEND=redis://redis:${REDIS_PORT:-6379}/1
      - QDRANT_URL=http://qdrant:${QDRANT_PORT:-6333}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this-in-production-make-it-very-long-and-random}
    volumes:
      - ./app-backend/data:/app/data
      - ./app-backend:/app
      # Cache HuggingFace models to avoid re-downloading
      - huggingface_cache:/root/.cache/huggingface
    networks:
      - cmatrix-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service (Next.js)
  app-frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile
    container_name: cmatrix-app-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PYTHON_BACKEND_URL=http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - cmatrix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${FRONTEND_PORT:-3000}', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cmatrix-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  audit_logs:
    driver: local
  huggingface_cache:
    driver: local
